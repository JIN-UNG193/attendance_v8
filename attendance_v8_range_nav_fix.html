<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>알바 캘린더 v3</title>
<style>
:root{
  --bg:#f8fafc;--card:#fff;--line:#e2e8f0;--line2:#cbd5e1;--text:#0f172a;--muted:#64748b;
  --blue:#2563eb;--blue2:#eff6ff;--red:#ef4444;--green:#16a34a;--amber:#f59e0b;
  --shadow:0 12px 28px rgba(15,23,42,.08);--r:22px;--safe-bottom:env(safe-area-inset-bottom,0px)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} body{margin:0;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;color:var(--text)}
button,input,select,textarea{font:inherit}button{border:0;background:none;cursor:pointer;color:inherit}.hidden{display:none!important}
.app{max-width:520px;margin:0 auto;min-height:100vh;padding:16px 16px calc(64px + var(--safe-bottom));position:relative}.top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}.top h1{margin:0;font-size:26px;letter-spacing:-.06em}.top p{margin:4px 0 0;color:var(--muted);font-size:13px;font-weight:800}.icon-btn{width:46px;height:46px;border-radius:16px;background:#fff;border:1px solid var(--line);box-shadow:0 6px 14px rgba(15,23,42,.05);display:grid;place-items:center;font-weight:1000}.month-card{background:#fff;border:1px solid var(--line);border-radius:28px;padding:16px 16px 14px;box-shadow:var(--shadow)}
.month-head{display:grid;grid-template-columns:52px 1fr 52px;align-items:center;gap:8px;margin-bottom:14px}.nav-btn{width:52px;height:52px;border-radius:18px;background:#f8fafc;border:1px solid #dbeafe;font-size:22px;font-weight:1000}.month-title{text-align:center;font-size:25px;font-weight:1000;letter-spacing:-.06em}.quick-title{display:flex;justify-content:space-between;align-items:center;margin:8px 0 10px}.quick-title strong{font-size:15px}.quick-title span{font-size:12px;color:var(--muted);font-weight:900}.chips{display:flex;gap:6px;overflow-x:auto;padding:2px 0 8px;scrollbar-width:none}.chips::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 12px;font-size:13px;font-weight:1000;box-shadow:0 4px 10px rgba(15,23,42,.04);white-space:nowrap}.chip.active{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 8px 18px rgba(37,99,235,.22)}.selected-strip{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:6px 0 10px;padding:10px 12px;border-radius:14px;background:var(--blue2);border:1px solid #bfdbfe}.selected-main{min-width:0}.selected-label{font-size:11px;color:var(--muted);font-weight:900;margin-bottom:3px}.selected-name{font-size:14px;font-weight:1000;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.selected-sub{font-size:12px;color:#475569;font-weight:900;margin-top:2px}.toggle{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:1000;white-space:nowrap}.toggle input{width:18px;height:18px;accent-color:var(--blue)}
.week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin:8px 0 6px}.weekday{text-align:center;color:var(--muted);font-size:12px;font-weight:1000}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{height:54px;border:1px solid var(--line);border-radius:18px;background:#fff;padding:7px 5px;display:flex;flex-direction:column;align-items:center;justify-content:space-between}.day.out{opacity:.32;background:#f1f5f9}.day.today .num{background:var(--blue);color:#fff}.day.selected{border:2px solid var(--blue);padding:6px 4px}.num{width:26px;height:26px;border-radius:999px;display:grid;place-items:center;font-weight:1000;font-size:13px}.dots{height:14px;display:flex;gap:3px;align-items:center;justify-content:center;max-width:100%;overflow:hidden}.dot{width:6px;height:6px;border-radius:50%;background:var(--blue)}.more{font-size:10px;font-weight:1000;color:var(--muted);line-height:1}.cost-card{margin-top:12px;background:#fff;border:1px solid var(--line);border-radius:22px;padding:16px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 8px 20px rgba(15,23,42,.05)}.cost-card span{font-size:12px;color:var(--muted);font-weight:900}.cost-card strong{display:block;font-size:18px;letter-spacing:-.04em;margin-top:3px}.small-pill{background:#f1f5f9;border:1px solid var(--line);border-radius:999px;padding:8px 11px;font-size:12px;font-weight:1000}
.tab{display:none}.tab.active{display:block}.list{display:flex;flex-direction:column;gap:10px}.list-card{background:#fff;border:1px solid var(--line);border-radius:20px;padding:15px;box-shadow:0 8px 18px rgba(15,23,42,.04)}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.name{font-weight:1000;font-size:16px}.sub{color:var(--muted);font-size:13px;font-weight:800;margin-top:3px}.money{font-weight:1000;color:var(--blue)}.primary{background:var(--blue);color:white;border-radius:16px;padding:13px 15px;font-weight:1000}.outline{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px 14px;font-weight:1000}.danger{background:#fee2e2;color:#b91c1c;border-radius:16px;padding:12px 14px;font-weight:1000}.section-head{display:flex;justify-content:space-between;align-items:center;margin:8px 0 14px}.section-head h2{margin:0;font-size:22px;letter-spacing:-.05em}.empty{padding:28px 16px;text-align:center;color:var(--muted);font-weight:900;background:#fff;border:1px dashed var(--line2);border-radius:20px}.settle-range{background:#fff;border:1px solid var(--line);border-radius:20px;padding:14px 15px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.settle-range span{font-size:12px;color:var(--muted);font-weight:900}.settle-range strong{display:block;margin-top:3px}.settle-card .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:12px}.metric{background:#f8fafc;border:1px solid var(--line);border-radius:16px;padding:10px}.metric span{display:block;font-size:11px;color:var(--muted);font-weight:900}.metric strong{display:block;font-size:16px;margin-top:3px}.bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);padding:6px 8px calc(6px + var(--safe-bottom));background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);gap:6px;z-index:50}.nav-item{border-radius:12px;padding:4px 2px;color:#475569;font-weight:900;font-size:11px}.nav-item .ico{font-size:18px;display:block;margin-bottom:1px}.nav-item.active{background:none;color:var(--blue);border-top:3px solid var(--blue)}.fab{position:fixed;right:calc(50% - min(260px,50vw) + 18px);bottom:calc(72px + var(--safe-bottom));width:56px;height:56px;border-radius:22px;background:var(--blue);color:#fff;font-size:30px;font-weight:1000;box-shadow:0 14px 28px rgba(37,99,235,.28);z-index:40}
.sheet-bg{position:fixed;inset:0;background:rgba(15,23,42,.36);z-index:80;display:none}.sheet-bg.show{display:block}.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(110%);width:min(520px,100%);max-height:86vh;overflow:auto;background:#fff;border-radius:28px 28px 0 0;box-shadow:0 -18px 40px rgba(15,23,42,.16);z-index:90;padding:10px 16px calc(18px + var(--safe-bottom));transition:.2s ease}.sheet.show{transform:translateX(-50%) translateY(0)}.handle{width:44px;height:5px;border-radius:999px;background:#cbd5e1;margin:4px auto 14px}.sheet h3{margin:0 0 12px;font-size:21px;letter-spacing:-.05em}.work-card{border:1px solid var(--line);border-radius:18px;padding:13px;margin-bottom:9px;background:#fff}.form{display:grid;gap:10px}.field label{display:block;font-size:12px;color:var(--muted);font-weight:1000;margin:0 0 5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line2);border-radius:14px;padding:12px;background:#fff;outline:none}.field textarea{min-height:76px;resize:vertical}.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.actions{display:flex;gap:8px;margin-top:8px}.actions>*{flex:1}.range-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}.range-day{height:36px;border-radius:10px;background:#fff;border:1px solid var(--line);font-weight:800;font-size:13px}.range-day.sel{background:var(--blue);color:#fff;border-color:var(--blue)}.range-day.in{background:#dbeafe;color:#1e3a8a;border-color:#bfdbfe}.notice{font-size:12px;color:var(--muted);font-weight:800;line-height:1.5}.settings-list{display:grid;gap:10px}.settings-list button{text-align:left}.hide-scroll{overflow:hidden}@media(max-width:380px){.app{padding-left:12px;padding-right:12px}.day{height:58px;border-radius:16px}.chip{padding:9px 12px}.month-title{font-size:22px}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div><h1 id="pageTitle">알바 캘린더</h1><p id="pageSub">알바 선택 후 날짜를 누르면 바로 배치</p></div>
    <button class="icon-btn" data-action="openSettings">⚙️</button>
  </header>

  <section id="tab-calendar" class="tab active">
    <div class="month-card">
      <div class="month-head"><button class="nav-btn" data-action="prevMonth">‹</button><div class="month-title" id="monthTitle"></div><button class="nav-btn" data-action="nextMonth">›</button></div>
      <div class="quick-title"><strong>빠른 등록</strong><span>가로 스크롤</span></div>
      <div class="chips" id="quickChips"></div>
      <div class="selected-strip">
        <div class="selected-main"><div class="selected-label">현재 선택</div><div class="selected-name" id="selectedWorkerName">알바를 선택하세요</div><div class="selected-sub" id="selectedWorkerSub">선택 후 날짜를 터치</div></div>
        <label class="toggle"><input id="continuous" type="checkbox" checked>연속</label>
      </div>
      <div class="week" id="week"></div><div class="calendar" id="calendar"></div>
    </div>
    <div class="cost-card"><div><span>이번달 예상 인건비</span><strong id="monthCost">₩0</strong></div><button class="small-pill" data-nav="settle">정산 보기</button></div>
  </section>

  <section id="tab-workers" class="tab">
    <div class="section-head"><h2>알바</h2><button class="primary" data-action="newWorker">+ 추가</button></div>
    <div class="list" id="workerList"></div>
  </section>

  <section id="tab-settle" class="tab">
    <div class="section-head"><h2>정산</h2></div>
    <button class="settle-range" data-action="openRange"><div><span>정산 기간</span><strong id="rangeText"></strong></div><div>📅</div></button>
    <div class="list" id="settleList"></div>
  </section>

  <section id="tab-settings" class="tab">
    <div class="section-head"><h2>설정</h2></div>
    <div class="settings-list">
      <button class="list-card" data-action="exportJson"><div class="name">JSON 백업</div><div class="sub">현재 데이터를 파일로 저장</div></button>
      <button class="list-card" data-action="importJson"><div class="name">JSON 복원</div><div class="sub">백업 파일에서 복원</div></button>
      <button class="list-card" data-action="exportCsv"><div class="name">정산 CSV 다운로드</div><div class="sub">현재 정산 기간 기준</div></button>
      <button class="list-card" data-action="clearData"><div class="name" style="color:#b91c1c">사용자 데이터 초기화</div><div class="sub">UI와 캘린더는 유지, 데이터만 삭제</div></button>
      <input id="importFile" class="hidden" type="file" accept="application/json">
    </div>
  </section>
</div>

<nav class="bottom-nav">
  <button class="nav-item active" data-nav="calendar"><span class="ico">🏠</span>캘린더</button>
  <button class="nav-item" data-nav="workers"><span class="ico">👥</span>알바</button>
  <button class="nav-item" data-nav="settle"><span class="ico">💰</span>정산</button>
  <button class="nav-item" data-nav="settings"><span class="ico">⚙️</span>설정</button>
</nav>
<div class="sheet-bg" id="sheetBg" data-action="closeSheet"></div><section class="sheet" id="sheet"><div class="handle"></div><div id="sheetContent"></div></section>
<script>
(()=>{
const STORE='attendance_v3_clean_mobile';
const KRW=n=>'₩'+Math.round(n||0).toLocaleString('ko-KR');
const pad=n=>String(n).padStart(2,'0');
const key=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const dateFromKey=s=>{const [y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)};
const esc=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const uid=()=>crypto?.randomUUID?crypto.randomUUID():'id_'+Date.now()+Math.random().toString(16).slice(2);
const defaultWorkers=[
 {id:uid(),name:'민수',start:'14:00',end:'18:00',wage:12000,color:'#2563eb',fav:true},
 {id:uid(),name:'철수',start:'10:00',end:'16:00',wage:11000,color:'#16a34a',fav:true},
 {id:uid(),name:'혜민',start:'13:00',end:'18:00',wage:12000,color:'#f59e0b',fav:true}
];
function monthStart(d){return new Date(d.getFullYear(),d.getMonth(),1)}
function monthEnd(d){return new Date(d.getFullYear(),d.getMonth()+1,0)}
function load(){try{const x=JSON.parse(localStorage.getItem(STORE)); if(x&&x.version===3)return x}catch(e){} return {version:3,tab:'calendar',view:new Date().toISOString(),selected:key(new Date()),activeWorkerId:null,continuous:true,workers:defaultWorkers,records:{},rangeStart:key(monthStart(new Date())),rangeEnd:key(monthEnd(new Date()))}}
let state=load();
function save(){localStorage.setItem(STORE,JSON.stringify(state))}
function viewDate(){return new Date(state.view)}
function setView(d){state.view=d.toISOString()}
function getWorker(id){return state.workers.find(w=>w.id===id)}
function hours(s,e,status){if(status==='결근')return 0;if(!s||!e)return 0;let [sh,sm]=s.split(':').map(Number),[eh,em]=e.split(':').map(Number);let a=sh*60+sm,b=eh*60+em;if(b<a)b+=1440;return Math.max(0,(b-a)/60)}
function recordsInRange(a,b){const A=dateFromKey(a),B=dateFromKey(b);B.setHours(23,59,59,999);let rows=[];Object.entries(state.records).forEach(([k,arr])=>{const d=dateFromKey(k);if(d>=A&&d<=B)arr.forEach(r=>rows.push({...r,date:k}))});return rows}
function addRecord(workerId,dateKey){const w=getWorker(workerId); if(!w)return; const arr=state.records[dateKey]||[]; if(arr.some(r=>r.workerId===w.id&&r.start===w.start&&r.end===w.end)){ if(!confirm('같은 시간대 기록이 이미 있습니다. 그래도 추가할까요?')) return }
 arr.push({id:uid(),workerId:w.id,name:w.name,start:w.start,end:w.end,wage:Number(w.wage)||0,status:'예정',memo:'',color:w.color}); state.records[dateKey]=arr; if(!state.continuous)state.activeWorkerId=null; save(); render(); toast(`${w.name} 등록 완료`) }
function monthRecords(){const p=`${viewDate().getFullYear()}-${pad(viewDate().getMonth()+1)}-`;return Object.entries(state.records).filter(([k])=>k.startsWith(p)).flatMap(([date,rs])=>rs.map(r=>({...r,date})))}
function calcGross(rows){return rows.reduce((s,r)=>s+hours(r.start,r.end,r.status)*(Number(r.wage)||0),0)}
function render(){document.body.classList.remove('hide-scroll');renderNav();renderHeader();renderCalendarTab();renderWorkers();renderSettle();document.getElementById('continuous').checked=!!state.continuous}
function renderNav(){document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.id===`tab-${state.tab}`));document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active',b.dataset.nav===state.tab))}
function renderHeader(){const titles={calendar:['알바 캘린더','알바 선택 후 날짜를 누르면 바로 배치'],workers:['알바 관리','기본시간과 시급을 미리 등록'],settle:['정산','기간별 근무시간과 지급액 확인'],settings:['설정','백업 · 복원 · 초기화']};document.getElementById('pageTitle').textContent=titles[state.tab][0];document.getElementById('pageSub').textContent=titles[state.tab][1]}
function renderCalendarTab(){const vd=viewDate();document.getElementById('monthTitle').textContent=`${vd.getFullYear()}년 ${vd.getMonth()+1}월`;document.getElementById('week').innerHTML=['월','화','수','목','금','토','일'].map(x=>`<div class="weekday">${x}</div>`).join('');
 const chips=[...state.workers].sort((a,b)=>(b.fav-a.fav)||a.name.localeCompare(b.name,'ko')).map(w=>`<button class="chip ${state.activeWorkerId===w.id?'active':''}" data-action="pickWorker" data-id="${w.id}">${w.fav?'★ ':''}${esc(w.name)}</button>`).join('')||'<div class="notice">알바 탭에서 알바를 추가하세요.</div>';document.getElementById('quickChips').innerHTML=chips;
 const sw=getWorker(state.activeWorkerId);document.getElementById('selectedWorkerName').textContent=sw?sw.name:'알바를 선택하세요';document.getElementById('selectedWorkerSub').textContent=sw?`${sw.start}~${sw.end} · ${KRW(sw.wage)}`:'선택 후 날짜를 터치';
 const first=new Date(vd.getFullYear(),vd.getMonth(),1);const start=new Date(vd.getFullYear(),vd.getMonth(),1-((first.getDay()+6)%7));let html='';const today=key(new Date());
 for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const k=key(d);const rs=state.records[k]||[];const out=d.getMonth()!==vd.getMonth();const dots=rs.slice(0,4).map(r=>`<span class="dot" style="background:${r.color||'#2563eb'}"></span>`).join('');html+=`<button class="day ${out?'out':''} ${k===today?'today':''} ${k===state.selected?'selected':''}" data-action="tapDate" data-date="${k}"><span class="num">${d.getDate()}</span><div class="dots">${dots}${rs.length>4?`<span class="more">+${rs.length-4}</span>`:''}</div></button>`}
 document.getElementById('calendar').innerHTML=html;document.getElementById('monthCost').textContent=KRW(calcGross(monthRecords()))}
function renderWorkers(){const box=document.getElementById('workerList');box.innerHTML=state.workers.map(w=>`<button class="list-card" data-action="editWorker" data-id="${w.id}"><div class="row"><div><div class="name"><span style="color:${w.color}">●</span> ${esc(w.name)} ${w.fav?'★':''}</div><div class="sub">${w.start}~${w.end} · ${KRW(w.wage)}</div></div><div>›</div></div></button>`).join('')||'<div class="empty">등록된 알바가 없습니다.</div>'}
function renderSettle(){document.getElementById('rangeText').textContent=`${state.rangeStart.replaceAll('-','.')} ~ ${state.rangeEnd.replaceAll('-','.')}`;const rows=recordsInRange(state.rangeStart,state.rangeEnd);const map=new Map();rows.forEach(r=>{const id=r.workerId||r.name;if(!map.has(id))map.set(id,{name:r.name,wage:r.wage,rows:[]});map.get(id).rows.push(r)});let html='';map.forEach(v=>{const h=v.rows.reduce((s,r)=>s+hours(r.start,r.end,r.status),0);const gross=calcGross(v.rows);const tax=gross*.033;html+=`<button class="list-card settle-card" data-action="settleDetail" data-id="${esc(v.name)}"><div class="row"><div><div class="name">${esc(v.name)}</div><div class="sub">${v.rows.length}일 · ${h.toFixed(1).replace('.0','')}시간</div></div><div class="money">${KRW(gross-tax)}</div></div><div class="grid"><div class="metric"><span>총 급여</span><strong>${KRW(gross)}</strong></div><div class="metric"><span>3.3% 공제</span><strong>${KRW(tax)}</strong></div></div></button>`});document.getElementById('settleList').innerHTML=html||'<div class="empty">선택 기간의 근무 기록이 없습니다.</div>'}
function openSheet(html){document.getElementById('sheetContent').innerHTML=html;document.getElementById('sheetBg').classList.add('show');document.getElementById('sheet').classList.add('show');document.body.classList.add('hide-scroll')}
function closeSheet(){document.getElementById('sheetBg').classList.remove('show');document.getElementById('sheet').classList.remove('show');document.body.classList.remove('hide-scroll')}
function toast(msg){const t=document.createElement('div');t.textContent=msg;t.style.cssText='position:fixed;left:50%;bottom:110px;transform:translateX(-50%);background:#0f172a;color:white;padding:10px 14px;border-radius:999px;font-weight:900;z-index:200;box-shadow:0 10px 20px rgba(0,0,0,.2)';document.body.appendChild(t);setTimeout(()=>t.remove(),1400)}
function dateSheet(k){state.selected=k;save();const rs=state.records[k]||[];openSheet(`<h3>${Number(k.slice(5,7))}월 ${Number(k.slice(8,10))}일</h3>${rs.map(r=>`<button class="work-card" data-action="editRecord" data-date="${k}" data-id="${r.id}"><div class="row"><div><div class="name">${esc(r.name)}</div><div class="sub">${r.start}~${r.end} · ${hours(r.start,r.end,r.status)}시간 · ${KRW(r.wage)}</div></div><span class="small-pill">${r.status}</span></div>${r.memo?`<div class="sub" style="margin-top:8px">${esc(r.memo)}</div>`:''}</button>`).join('')||'<div class="empty">등록된 근무가 없습니다.</div>'}<button class="primary" style="width:100%;margin-top:10px" data-action="newRecordForDate" data-date="${k}">+ 근무 추가</button>`);render()}
function workerForm(w={}){openSheet(`<h3>${w.id?'알바 수정':'알바 추가'}</h3><div class="form"><div class="field"><label>이름</label><input id="fwName" value="${esc(w.name||'')}" placeholder="예: 최혜민"></div><div class="form2"><div class="field"><label>기본 출근</label><input id="fwStart" type="time" value="${w.start||'14:00'}"></div><div class="field"><label>기본 퇴근</label><input id="fwEnd" type="time" value="${w.end||'18:00'}"></div></div><div class="form2"><div class="field"><label>시급</label><input id="fwWage" type="number" value="${w.wage||12000}"></div><div class="field"><label>색상</label><input id="fwColor" type="color" value="${w.color||'#2563eb'}"></div></div><label class="toggle"><input id="fwFav" type="checkbox" ${w.fav!==false?'checked':''}>즐겨찾기</label><div class="actions"><button class="primary" data-action="saveWorker" data-id="${w.id||''}">저장</button>${w.id?`<button class="danger" data-action="deleteWorker" data-id="${w.id}">삭제</button>`:''}</div></div>`)}
function recordForm(k,r={}){const opts=state.workers.map(w=>`<option value="${w.id}" ${r.workerId===w.id?'selected':''}>${esc(w.name)}</option>`).join('');openSheet(`<h3>${r.id?'근무 수정':'근무 추가'}</h3><div class="form"><div class="field"><label>알바</label><select id="frWorker">${opts}</select></div><div class="form2"><div class="field"><label>출근</label><input id="frStart" type="time" value="${r.start||'14:00'}"></div><div class="field"><label>퇴근</label><input id="frEnd" type="time" value="${r.end||'18:00'}"></div></div><div class="form2"><div class="field"><label>시급</label><input id="frWage" type="number" value="${r.wage||12000}"></div><div class="field"><label>상태</label><select id="frStatus"><option>예정</option><option>정상</option><option>지각</option><option>조퇴</option><option>결근</option><option>대체</option></select></div></div><div class="field"><label>메모</label><textarea id="frMemo">${esc(r.memo||'')}</textarea></div><div class="actions"><button class="primary" data-action="saveRecord" data-date="${k}" data-id="${r.id||''}">저장</button>${r.id?`<button class="danger" data-action="deleteRecord" data-date="${k}" data-id="${r.id}">삭제</button>`:''}</div></div>`);setTimeout(()=>{document.getElementById('frStatus').value=r.status||'예정';const sel=document.getElementById('frWorker');sel.onchange=()=>{const w=getWorker(sel.value);if(w){document.getElementById('frStart').value=w.start;document.getElementById('frEnd').value=w.end;document.getElementById('frWage').value=w.wage}}},0)}
function rangeSheet(){const vd=viewDate();const first=new Date(vd.getFullYear(),vd.getMonth(),1);const start=new Date(vd.getFullYear(),vd.getMonth(),1-((first.getDay()+6)%7));let days='';for(let i=0;i<42;i++){const d=new Date(start);d.setDate(start.getDate()+i);const k=key(d);const inR=k>=state.rangeStart&&k<=state.rangeEnd;const out=d.getMonth()!==vd.getMonth();days+=`<button class="range-day ${k===state.rangeStart||k===state.rangeEnd?'sel':''} ${inR?'in':''}" style="${out?'opacity:.35':''}" data-action="pickRange" data-date="${k}">${d.getDate()}</button>`}openSheet(`<h3>정산 기간 선택</h3><div class="row" style="margin-bottom:10px"><button class="outline" data-action="prevMonth">◀</button><strong>${vd.getFullYear()}년 ${vd.getMonth()+1}월</strong><button class="outline" data-action="nextMonth">▶</button></div><div class="notice">시작일: ${state.rangeStart}<br>종료일: ${state.rangeEnd}</div><div class="range-cal">${['월','화','수','목','금','토','일'].map(x=>`<div class="weekday">${x}</div>`).join('')}${days}</div><button class="primary" style="width:100%;margin-top:12px" data-action="closeSheet">적용</button>`)}
let rangePickingStart=true;
document.addEventListener('click',e=>{const b=e.target.closest('button'); if(!b)return; const a=b.dataset.action,id=b.dataset.id;
 if(b.dataset.nav){state.tab=b.dataset.nav;save();render();return}
 if(a==='openSettings'){state.tab='settings';save();render()} if(a==='prevMonth'){const d=viewDate();setView(new Date(d.getFullYear(),d.getMonth()-1,1));save();render();if(document.getElementById('sheet').classList.contains('show')) rangeSheet()} if(a==='nextMonth'){const d=viewDate();setView(new Date(d.getFullYear(),d.getMonth()+1,1));save();render();if(document.getElementById('sheet').classList.contains('show')) rangeSheet()}
 if(a==='pickWorker'){state.activeWorkerId=state.activeWorkerId===id?null:id;save();render()} if(a==='tapDate'){if(state.activeWorkerId)addRecord(state.activeWorkerId,b.dataset.date);else dateSheet(b.dataset.date)}
 if(a==='newWorker'||(a==='fab'&&state.tab==='workers'))workerForm(); if(a==='editWorker')workerForm(getWorker(id)); if(a==='saveWorker'){const data={id:id||uid(),name:fwName.value.trim(),start:fwStart.value,end:fwEnd.value,wage:+fwWage.value||0,color:fwColor.value,fav:fwFav.checked}; if(!data.name)return toast('이름을 입력하세요'); const idx=state.workers.findIndex(w=>w.id===data.id); if(idx>=0)state.workers[idx]=data; else state.workers.push(data); save(); closeSheet(); render()} if(a==='deleteWorker'){if(confirm('알바 정보를 삭제할까요? 기존 근무기록은 유지됩니다.')){state.workers=state.workers.filter(w=>w.id!==id); if(state.activeWorkerId===id)state.activeWorkerId=null;save();closeSheet();render()}}
 if(a==='newRecordForDate'||(a==='fab'&&state.tab==='calendar'))recordForm(b.dataset.date||state.selected); if(a==='editRecord'){const r=(state.records[b.dataset.date]||[]).find(x=>x.id===id);recordForm(b.dataset.date,r)} if(a==='saveRecord'){const k=b.dataset.date;const w=getWorker(frWorker.value)||{};const arr=state.records[k]||[];const rec={id:id||uid(),workerId:frWorker.value,name:w.name||'이름없음',start:frStart.value,end:frEnd.value,wage:+frWage.value||0,status:frStatus.value,memo:frMemo.value,color:w.color||'#2563eb'};const idx=arr.findIndex(r=>r.id===rec.id);if(idx>=0)arr[idx]=rec;else arr.push(rec);state.records[k]=arr;save();closeSheet();render()} if(a==='deleteRecord'){const k=b.dataset.date;state.records[k]=(state.records[k]||[]).filter(r=>r.id!==id);save();closeSheet();render()}
 if(a==='openRange')rangeSheet(); if(a==='pickRange'){const k=b.dataset.date;if(rangePickingStart){state.rangeStart=k;state.rangeEnd=k;rangePickingStart=false}else{if(k<state.rangeStart){state.rangeEnd=state.rangeStart;state.rangeStart=k}else state.rangeEnd=k;rangePickingStart=true}save();rangeSheet();renderSettle()} if(a==='closeSheet')closeSheet();
 if(a==='exportJson'){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});download(blob,'attendance_backup.json')} if(a==='importJson')importFile.click(); if(a==='exportCsv')exportCsv(); if(a==='clearData'){if(confirm('사용자 데이터만 초기화할까요?')){state.workers=[];state.records={};state.activeWorkerId=null;save();render();toast('초기화 완료')}}
});
sheetBg.onclick=closeSheet;continuous.onchange=()=>{state.continuous=continuous.checked;save()};importFile.onchange=async e=>{const file=e.target.files[0];if(!file)return;try{const data=JSON.parse(await file.text());state={...state,...data,version:3};save();render();toast('복원 완료')}catch(err){toast('복원 실패')}};
function download(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();URL.revokeObjectURL(a.href)}
function exportCsv(){const rows=recordsInRange(state.rangeStart,state.rangeEnd);let map=new Map();rows.forEach(r=>{const id=r.workerId||r.name;if(!map.has(id))map.set(id,{name:r.name,h:0,gross:0});const x=map.get(id);const h=hours(r.start,r.end,r.status);x.h+=h;x.gross+=h*(+r.wage||0)});let csv='이름,근무시간,총급여,공제액,실지급액\n';map.forEach(x=>{const tax=x.gross*.033;csv+=`${x.name},${x.h},${Math.round(x.gross)},${Math.round(tax)},${Math.round(x.gross-tax)}\n`});download(new Blob(['\ufeff'+csv],{type:'text/csv'}),'attendance_settlement.csv')}
render();
})();
</script>
</body>
</html>
